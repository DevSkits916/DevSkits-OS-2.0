<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevSkits 3.1</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="boot-screen" class="boot-screen" aria-live="polite">
    <div class="boot-panel">
      <div id="boot-logo" class="boot-logo" aria-label="DevSkits 3.1 boot logo"></div>
      <h1>DevSkits 3.1</h1>
      <p id="boot-status">Initializing identity shell...</p>
      <div class="boot-progress"><span id="boot-bar"></span></div>
      <div class="badges">
        <button id="boot-skip" class="link-btn" type="button">Skip Boot</button>
      </div>
    </div>
  </div>

  <div id="desktop" class="desktop hidden" role="application" aria-label="DevSkits Desktop">
    <div id="desktop-brandmark" class="desktop-brandmark" aria-hidden="true"></div>
    <div class="scanlines"></div>
    <div id="desktop-icons" class="desktop-icons" tabindex="0" aria-label="Desktop icons"></div>
    <div id="window-layer" class="window-layer"></div>
    <div id="selection-box" class="selection-box hidden"></div>

    <div id="desktop-context-menu" class="context-menu hidden">
      <button data-action="refresh">Refresh</button>
      <button data-action="new-note">New Note</button>
      <button data-action="new-sticky">New Sticky</button>
      <button data-action="terminal">Terminal</button>
      <button data-action="settings">Settings</button>
      <button data-action="reboot">Reboot</button>
      <button data-action="shutdown">Shut Down</button>
    </div>

    <div id="start-menu" class="start-menu hidden" aria-hidden="true" role="menu" aria-label="Start Menu">
      <div class="start-header">DevSkits Launcher</div>
      <input id="start-search" class="start-search" placeholder="Search launcher..." aria-label="Search apps" />
      <div id="start-sections" class="start-sections"></div>
    </div>

    <div id="notification-area" class="notification-area"></div>

    <div id="run-dialog" class="run-dialog hidden" role="dialog" aria-modal="true">
      <div class="run-panel">
        <h3>Run</h3>
        <p>Type an app name or internal URL.</p>
        <input id="run-input" class="start-search" placeholder="browser | inbox | devskits://projects"/>
        <div class="badges">
          <button id="run-go" class="link-btn">Run</button>
          <button id="run-cancel" class="link-btn">Cancel</button>
        </div>
      </div>
    </div>

    <footer class="taskbar">
      <button id="start-btn" class="start-btn" aria-expanded="false" aria-controls="start-menu">Start</button>
      <div id="task-buttons" class="task-buttons" aria-label="Open windows"></div>
      <div class="system-tray">
        <time id="clock"></time>
      </div>
    </footer>
  </div>

  <template id="desktop-icon-template">
    <button class="desktop-icon" type="button">
      <span class="icon-glyph" aria-hidden="true"></span>
      <span class="icon-label"></span>
    </button>
  </template>

  <template id="window-template">
    <section class="window" role="dialog" aria-modal="false">
      <header class="window-titlebar">
        <span class="window-title"></span>
        <div class="window-controls">
          <button class="win-min" aria-label="Minimize">_</button>
          <button class="win-max" aria-label="Maximize">□</button>
          <button class="win-close" aria-label="Close">✕</button>
        </div>
      </header>
      <div class="window-content"></div>
      <span class="resize-handle"></span>
    </section>
  </template>

  <script src="js/data/projects.js"></script>
  <script src="js/data/filesystem.js"></script>
  <script src="js/data/system-data.js"></script>
  <script src="js/core/branding.js"></script>
  <script src="js/core/state.js"></script>
  <script src="js/core/world.js"></script>
  <script src="js/core/terminal-engine.js"></script>
  <script src="js/core/window-manager.js"></script>
  <script src="js/core/desktop.js"></script>
  <script src="js/core/start-menu.js"></script>
  <script src="js/apps/contact.js"></script>
  <script src="js/apps/donate.js"></script>
  <script src="js/apps/projects.js"></script>
  <script src="js/apps/loki.js"></script>
  <script src="js/apps/notes.js"></script>
  <script src="js/apps/links.js"></script>
  <script src="js/apps/about.js"></script>
  <script src="js/apps/settings.js"></script>
  <script src="js/apps/files.js"></script>
  <script src="js/apps/terminal.js"></script>
  <script src="js/apps/phase4-tools.js"></script>
  <script src="js/apps/phase4-world.js"></script>
  <script src="js/apps/phase5-living.js"></script>
  <script src="app.js"></script>
</body>
</html>
